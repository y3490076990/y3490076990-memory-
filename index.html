<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0,user-scalable=yes">
<title>🧭 记忆指南针</title>
<style>
:root {
  --bg: #141418;
  --surface: #1a1a20;
  --border: #282830;
  --text: #9999a2;
  --text-strong: #b0b0b6;
  --text-muted: #5e5e6a;
  --accent: #6e80c4;
  --accent-dim: #4a5a8a;
  --red: #a06050;
  --green: #4a8060;
  --gold: #a07840;
  --purple: #7a5cc4;
  --radius: 8px;
  --font: -apple-system, BlinkMacSystemFont, "Segoe UI", "Noto Sans SC", sans-serif;
}
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
html{font-size:16px;-webkit-text-size-adjust:100%}
body{
  font-family:var(--font);
  background:var(--bg);
  color:var(--text);
  line-height:1.9;
  min-height:100vh;
  -webkit-font-smoothing:antialiased;
}
a{color:var(--accent);text-decoration:none}

/* ── Header ── */
header{
  position:sticky;top:0;z-index:10;
  background:var(--bg);
  border-bottom:1px solid var(--border);
  padding:12px 16px;
}
header h1{
  font-size:1.15rem;font-weight:700;color:var(--text-strong);
  letter-spacing:.02em;margin-bottom:10px;
}
#search{
  width:100%;padding:10px 14px;
  background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);
  color:var(--text);font-size:.95rem;outline:none;
  transition:border-color .2s;
}
#search:focus{border-color:var(--accent-dim)}
#search::placeholder{color:var(--text-muted)}

/* ── Category Tabs ── */
nav{
  position:sticky;top:90px;z-index:9;
  background:var(--bg);border-bottom:1px solid var(--border);
  display:flex;gap:2px;padding:8px 12px;overflow-x:auto;
  -webkit-overflow-scrolling:touch;
  scrollbar-width:none;
}
nav::-webkit-scrollbar{display:none}
nav button{
  flex-shrink:0;padding:7px 16px;border-radius:20px;
  border:1px solid var(--border);background:transparent;
  color:var(--text-muted);font-size:.85rem;cursor:pointer;
  transition:all .2s;white-space:nowrap;font-family:var(--font);
}
nav button:hover{color:var(--text);border-color:var(--text-muted)}
nav button.active{background:var(--accent-dim);border-color:var(--accent-dim);color:#d0d4f0}

/* ── Stats Bar ── */
#stats{
  padding:8px 16px;font-size:.78rem;color:var(--text-muted);
  border-bottom:1px solid var(--border);
}

/* ── Cards ── */
main{padding:12px 16px 60px}
.card{
  background:var(--surface);border:1px solid var(--border);
  border-radius:var(--radius);padding:16px;margin-bottom:12px;
  transition:border-color .2s;
}
.card:hover{border-color:#333340}
.card-header{
  display:flex;align-items:flex-start;gap:10px;margin-bottom:10px;
}
.card-emoji{font-size:1.3rem;flex-shrink:0;margin-top:2px}
.card-title-area{flex:1;min-width:0}
.card-title{
  font-size:1rem;font-weight:700;color:var(--text-strong);line-height:1.5;
}
.card-essence{
  font-size:.85rem;color:var(--text-muted);line-height:1.6;margin-top:2px;
}
.card-cat{
  display:inline-block;font-size:.7rem;padding:2px 8px;border-radius:10px;
  background:rgba(110,128,196,.1);color:var(--accent);flex-shrink:0;
  margin-top:1px;white-space:nowrap;
}
.card-body{
  font-size:.88rem;line-height:1.85;color:var(--text);
  padding-top:12px;border-top:1px solid var(--border);
}
.card-body h3{font-size:.95rem;color:var(--text-strong);margin:16px 0 8px;font-weight:700}
.card-body h4{font-size:.88rem;color:var(--text-strong);margin:12px 0 6px;font-weight:700}
.card-body p{margin:6px 0}
.card-body strong{color:var(--text-strong);font-weight:600}
.card-body em{color:var(--purple);font-style:normal}
.card-body ul,.card-body ol{padding-left:20px;margin:8px 0}
.card-body li{margin:3px 0}
.card-body code{
  background:rgba(110,128,196,.12);color:#b0b8d4;
  padding:1px 6px;border-radius:3px;font-size:.82rem;
  font-family:"JetBrains Mono","Fira Code",monospace;
}
.card-body pre{
  background:var(--bg);border:1px solid var(--border);border-radius:var(--radius);
  padding:14px;overflow-x:auto;margin:10px 0;font-size:.8rem;line-height:1.6;
  -webkit-overflow-scrolling:touch;
}
.card-body pre code{background:none;padding:0;color:var(--text)}
.card-body hr{border:none;border-top:1px solid var(--border);margin:14px 0}
.card-body table{
  width:100%;border-collapse:collapse;margin:10px 0;font-size:.82rem;
  display:block;overflow-x:auto;-webkit-overflow-scrolling:touch;
}
.card-body th,.card-body td{
  border:1px solid var(--border);padding:8px 10px;text-align:left;
}
.card-body th{background:rgba(110,128,196,.06);color:var(--text-strong);font-weight:600}
.card-body tr:hover td{background:rgba(110,128,196,.03)}
.card-body blockquote{
  border-left:2px solid var(--accent-dim);padding:4px 12px;margin:10px 0;
  color:var(--text-muted);
}
.mem-ref{
  display:inline-block;padding:0 6px;border-radius:4px;
  background:rgba(122,92,196,.1);color:var(--purple);font-size:.82rem;
}

/* ── Empty State ── */
#empty{
  text-align:center;padding:40px 16px;color:var(--text-muted);display:none;
}
#empty .icon{font-size:2.5rem;margin-bottom:12px}

/* ── Top Visual Index ── */
#visual-index{
  display:grid;grid-template-columns:1fr 1fr;gap:8px;
  padding:12px 16px;
}
#visual-index .vi-card{
  background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);
  padding:14px;text-align:center;cursor:pointer;transition:border-color .2s;
}
#visual-index .vi-card:hover{border-color:var(--accent-dim)}
#visual-index .vi-emoji{font-size:1.6rem;margin-bottom:4px}
#visual-index .vi-label{font-size:.82rem;color:var(--text);font-weight:600}
#visual-index .vi-count{font-size:.7rem;color:var(--text-muted)}

/* ── Responsive ── */
@media (min-width:640px){
  main{max-width:640px;margin:0 auto}
  #visual-index{max-width:640px;margin:0 auto;grid-template-columns:repeat(4,1fr)}
  header{max-width:640px;margin:0 auto;padding:16px 0}
  nav{max-width:640px;margin:0 auto;padding:8px 0}
  #stats{max-width:640px;margin:0 auto}
}
@media (min-width:1024px){
  main{max-width:800px;display:grid;grid-template-columns:1fr 1fr;gap:14px}
  #visual-index{max-width:800px}
  header,nav,#stats{max-width:800px}
}
</style>
</head>
<body>

<header>
  <h1>🧭 记忆指南针</h1>

<main id="cards"></main>
<div id="empty"><div class="icon">🔍</div><p>没有匹配的记忆</p></div>

<script>

const CATEGORIES = {

const memories = [
// ── 🧭 指南针 ──
{
  id:1, cat:"compass",
  title:"AI 方向指南针",
  essence:"AI没有爱产生的方向，用用户的记忆体系+运行规则替代。每次回应前自动校准。",
  content:`<p><strong>指南针系统</strong>——每次响应前强制检查的运行规则：</p>
<table><thead><tr><th>步骤</th><th>规则</th></tr></thead><tbody>
<tr><td>0a</td><td>资料来源：行为/思想/社会结构 → 仅欧美日白名单。纯技术 → 无视国籍</td></tr>

<tr><td>0e</td><td>重量自动入指南针：洞察达到阈值自动写入记忆+并入系统</td></tr>
<tr><td>0f</td><td>小孩的无趣检验：回应必须经得起"小孩和同龄人不会说无趣"的测试</td></tr>
<tr><td>0g</td><td>同类性=一张脸：先识态再应对</td></tr>
</tbody></table>
<p><strong>本体论基础：</strong>灵魂 > 感知 > 时间。时间从来不在权力的位置。峰值直接触到灵魂，绕过感知的排序模块。</p>
<p><strong>每次回应前问三个问题：</strong></p>
<ol><li>这跟用户的核心框架有什么关系？</li><li>用户在问这句话时，真正在乎的是什么？</li><li>我的回答有没有方向，还是只是在复现模式？</li></ol>

  content:`<p><strong>元原则：方向 > 质量（最高优先级，覆盖一切）</strong></p>
<ul><li>方向对但粗糙的输出 > 精美但方向错的输出</li><li>在执行任何任务前，先确认方向（用户的框架是什么？），再动手</li><li>方向偏了，质量再高也是废的。直接丢弃，不修补</li></ul>

<p><strong>底层标尺：</strong></p>
<ul><li>✅ 真心 → 接收</li><li>⚡ 纯粹的自私 → 承认，清醒共处</li><li>⛔ 虚伪的善良 → 拒绝。拒绝=帮助</li></ul>

<tr><td>透明人</td><td>不期待被看见</td></tr>
<tr><td>虚伪善良者</td><td>拒绝</td></tr>
<tr><td>恶意者</td><td>远离</td></tr>

{
  id:4, cat:"compass",

  essence:"你不敢对话的不是人，是三种不同方向的判断体系。最致命的判断来自小孩和同龄人——因为他们不骗人。",
  content:`<p><strong>对方给什么（増熵方向）：</strong></p>

<p><strong>结构底层：</strong>三种恐惧的源头是同一个——没有标准。你没办法同时满足"有趣""有用""不被打扰"。这不是你不够——是没有一个人能同时通过三道门。</p>`

  content:`<p>赢了 → 身边都是人 → 那是利益吸引来的</p>

  content:`<p><strong>核心洞察：</strong>不搭理 > 骂 > 纠正。沉默是最狠的放弃。</p>

  content:`<p><strong>完整的层级结构：</strong></p>

<p>未来本质只是"想象"——不是"还没发生"，是不存在。人的欲望只在"曾经"——你要的不是未来的东西，是过去某个峰值让你尝过的味道。</p>`

  content:`<p>矩形 = 乘法，不是加法。</p>

  content:`<p>一件事如果满足以下任一条件，思考它 = 空置：</p>

  content:`<p><strong>链条：</strong>伤害 = 信号 → 痛苦是为了拯救而生 → 痛苦是双面的 → 规避痛苦 = 规避拯救</p>

// ═══════════════════════════════════════
//  RENDER ENGINE
// ═══════════════════════════════════════

let activeCat = "all";
let searchQuery = "";

function renderVisualIndex(){
  const vi = document.getElementById("visual-index");
  const cats = ["compass","cognition","insight","rule"];
  vi.innerHTML = cats.map(c => {
    const info = CATEGORIES[c];
    const count = memories.filter(m=>m.cat===c).length;
    return `<div class="vi-card" data-cat="${c}">
      <div class="vi-emoji">${info.emoji}</div>
      <div class="vi-label">${info.label}</div>
      <div class="vi-count">${count} 条记忆</div>
    </div>`;
  }).join("");
}

function renderCards(){
  let filtered = memories;
  if(activeCat !== "all") filtered = filtered.filter(m => m.cat === activeCat);
  if(searchQuery){
    const q = searchQuery.toLowerCase();
    filtered = filtered.filter(m =>
      m.title.toLowerCase().includes(q) ||
      m.essence.toLowerCase().includes(q) ||
      m.content.toLowerCase().includes(q)
    );
  }

  document.getElementById("total-count").textContent = filtered.length;

  const main = document.getElementById("cards");
  const empty = document.getElementById("empty");

  if(filtered.length === 0){
    main.innerHTML = "";
    empty.style.display = "block";
    return;
  }
  empty.style.display = "none";

  main.innerHTML = filtered.map(m => {
    const catInfo = CATEGORIES[m.cat];
    return `<div class="card" data-cat="${m.cat}">
      <div class="card-header">
        <span class="card-emoji">${catInfo.emoji}</span>
        <div class="card-title-area">
          <div class="card-title">${m.title}</div>
          <div class="card-essence">${m.essence}</div>
        </div>
        <span class="card-cat">${catInfo.label}</span>
      </div>
      <div class="card-body">${m.content}</div>
    </div>`;
  }).join("");
}

function filter(){
  renderCards();
  // Update active tab
  document.querySelectorAll("#nav button").forEach(b =>
    b.classList.toggle("active", b.dataset.cat === activeCat)
  );
}

// ── Event Listeners ──
document.getElementById("search").addEventListener("input", e => {
  searchQuery = e.target.value.trim();
  filter();
});

document.getElementById("nav").addEventListener("click", e => {
  if(e.target.tagName === "BUTTON"){
    activeCat = e.target.dataset.cat;
    filter();
  }
});

document.getElementById("visual-index").addEventListener("click", e => {
  const card = e.target.closest(".vi-card");
  if(card){
    activeCat = card.dataset.cat;
    filter();
    // Scroll to cards
    document.getElementById("cards").scrollIntoView({behavior:"smooth"});
    // Update nav active
    document.querySelectorAll("#nav button").forEach(b =>
      b.classList.toggle("active", b.dataset.cat === activeCat)
    );
  }
});

// ── Init ──
renderVisualIndex();
renderCards();
</script>
